<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="blueHead" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1f8be6"/>
      <stop offset="1" stop-color="#075cae"/>
    </linearGradient>
    <linearGradient id="orangeHead" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ff8a25"/>
      <stop offset="1" stop-color="#ec5d07"/>
    </linearGradient>
    <linearGradient id="greenHead" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#5ebc43"/>
      <stop offset="1" stop-color="#319225"/>
    </linearGradient>
    <linearGradient id="dataBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f4fbff"/>
      <stop offset="1" stop-color="#dceeff"/>
    </linearGradient>
    <linearGradient id="appBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fff7ef"/>
      <stop offset="1" stop-color="#ffe6cf"/>
    </linearGradient>
    <linearGradient id="uiBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fff4"/>
      <stop offset="1" stop-color="#e5f7dc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#9a9a9a" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6d8598"/>
    </marker>
    <style>
      .title{font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:700;fill:#fff}
      .label{font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:700;fill:#fff}
      .small{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#1f2d38}
      .tiny{font-family:Arial,Helvetica,sans-serif;font-size:11px;fill:#41515f}
      .panel{stroke-width:1.5;rx:3}
      .dash{stroke:#9ab3c7;stroke-width:1;stroke-dasharray:4 4}
      .flow{stroke:#6d8598;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .iconStroke{stroke:#2680c2;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

  <rect width="900" height="400" fill="#ffffff"/>

  <!-- Data Layer -->
  <rect class="panel" x="38" y="43" width="242" height="255" fill="url(#dataBg)" stroke="#6fa9dd"/>
  <rect x="56" y="23" width="206" height="35" rx="5" fill="url(#blueHead)" filter="url(#shadow)"/>
  <text class="title" x="159" y="46" text-anchor="middle">Data Layer</text>

  <ellipse cx="159" cy="82" rx="55" ry="12" fill="#72a9dc"/>
  <rect x="104" y="82" width="110" height="46" fill="#2879bd"/>
  <ellipse cx="159" cy="128" rx="55" ry="12" fill="#1266aa"/>
  <text class="label" x="159" y="105" text-anchor="middle">MySQL</text>
  <text class="label" x="159" y="121" text-anchor="middle">Database</text>

  <text class="small" x="96" y="153">- Users &amp; roles</text>
  <text class="small" x="96" y="171">- Menu items</text>
  <text class="small" x="96" y="189">- Orders &amp; cart data</text>
  <text class="small" x="96" y="207">- Table/event bookings</text>
  <text class="small" x="96" y="225">- Payments &amp; refunds</text>

  <line class="dash" x1="61" y1="243" x2="257" y2="243"/>
  <rect x="89" y="256" width="140" height="30" rx="4" fill="url(#blueHead)" filter="url(#shadow)"/>
  <text class="label" x="159" y="276" text-anchor="middle">Data Validation</text>

  <!-- Application Layer -->
  <rect class="panel" x="292" y="43" width="226" height="255" fill="url(#appBg)" stroke="#f08a33"/>
  <rect x="311" y="23" width="207" height="35" rx="5" fill="url(#orangeHead)" filter="url(#shadow)"/>
  <text class="title" x="414" y="46" text-anchor="middle">Application Layer</text>

  <rect x="338" y="74" width="146" height="32" rx="4" fill="url(#orangeHead)" filter="url(#shadow)"/>
  <text class="label" x="411" y="95" text-anchor="middle">REST API</text>
  <path class="flow" d="M411 106 L411 123"/>

  <rect x="338" y="125" width="146" height="42" rx="4" fill="url(#orangeHead)" filter="url(#shadow)"/>
  <text class="label" x="411" y="144" text-anchor="middle">Spring Boot</text>
  <text class="label" x="411" y="160" text-anchor="middle">Service Logic</text>
  <path class="flow" d="M411 167 L411 184"/>

  <rect x="338" y="186" width="146" height="32" rx="4" fill="url(#orangeHead)" filter="url(#shadow)"/>
  <text class="label" x="411" y="207" text-anchor="middle">Processing</text>

  <g transform="translate(370 231)">
    <circle cx="21" cy="21" r="14" fill="#6e7d86"/>
    <circle cx="54" cy="22" r="18" fill="#53636e"/>
    <circle cx="91" cy="18" r="12" fill="#6e7d86"/>
    <path d="M21 1v7M21 34v7M1 21h7M34 21h7M9 9l5 5M28 28l5 5M9 33l5-5M28 14l5-5" stroke="#6e7d86" stroke-width="5" stroke-linecap="round"/>
    <path d="M54 -2v8M54 38v8M30 22h8M70 22h8M38 6l6 6M64 32l6 6M38 38l6-6M64 12l6-6" stroke="#53636e" stroke-width="6" stroke-linecap="round"/>
  </g>
  <rect x="336" y="265" width="150" height="22" rx="3" fill="#2f5f86"/>
  <text class="label" x="411" y="281" text-anchor="middle">Business Workflow</text>

  <!-- Presentation Layer -->
  <rect class="panel" x="550" y="43" width="252" height="308" fill="url(#uiBg)" stroke="#5eaa42"/>
  <rect x="578" y="23" width="207" height="35" rx="5" fill="url(#greenHead)" filter="url(#shadow)"/>
  <text class="title" x="681" y="46" text-anchor="middle">Presentation Layer</text>

  <rect x="571" y="74" width="97" height="72" rx="6" fill="#fff" stroke="#4c9c38" stroke-width="1.5"/>
  <g transform="translate(587 86)">
    <path d="M0 33 A31 31 0 0 1 62 33" fill="none" stroke="#ef4056" stroke-width="13"/>
    <path d="M14 11 A31 31 0 0 1 36 3" fill="none" stroke="#ffae2d" stroke-width="13"/>
    <path d="M36 3 A31 31 0 0 1 62 33" fill="none" stroke="#3fb56a" stroke-width="13"/>
    <line x1="31" y1="33" x2="50" y2="18" stroke="#34495e" stroke-width="3"/>
    <circle cx="31" cy="33" r="6" fill="#34495e"/>
  </g>
  <text class="small" x="620" y="136" text-anchor="middle">Order Status</text>

  <rect x="679" y="74" width="97" height="72" rx="6" fill="#fff" stroke="#4c9c38" stroke-width="1.5"/>
  <g transform="translate(697 91)">
    <rect x="4" y="24" width="10" height="25" fill="#2b87d1"/>
    <rect x="22" y="14" width="10" height="35" fill="#f06049"/>
    <rect x="40" y="29" width="10" height="20" fill="#ffbf35"/>
    <rect x="58" y="8" width="10" height="41" fill="#49a84f"/>
    <path d="M0 50H74M0 0V50" stroke="#3d4b55" stroke-width="2"/>
  </g>
  <text class="small" x="728" y="136" text-anchor="middle">Sales Reports</text>

  <rect x="571" y="158" width="97" height="72" rx="6" fill="#fff" stroke="#4c9c38" stroke-width="1.5"/>
  <g transform="translate(591 175)">
    <path d="M0 36 L14 25 L26 30 L39 16 L55 21 L72 6" stroke="#2489d6" stroke-width="3" fill="none"/>
    <path d="M0 45 L15 38 L28 39 L42 31 L55 33 L72 23" stroke="#ff8b22" stroke-width="3" fill="none"/>
    <path d="M0 52H74M0 0V52" stroke="#3d4b55" stroke-width="2"/>
  </g>
  <text class="small" x="620" y="220" text-anchor="middle">Booking View</text>

  <rect x="679" y="158" width="97" height="72" rx="6" fill="#fff" stroke="#4c9c38" stroke-width="1.5"/>
  <g transform="translate(696 174)">
    <rect x="0" y="30" width="66" height="16" rx="5" fill="#8b5e3c"/>
    <rect x="7" y="12" width="52" height="22" rx="6" fill="#c98b57"/>
    <path d="M14 34v18M52 34v18M6 46h54" stroke="#674326" stroke-width="4" stroke-linecap="round"/>
    <circle cx="18" cy="22" r="3" fill="#fff3da"/>
    <circle cx="33" cy="22" r="3" fill="#fff3da"/>
    <circle cx="48" cy="22" r="3" fill="#fff3da"/>
  </g>
  <text class="small" x="728" y="220" text-anchor="middle">Cafe Menu</text>

  <g transform="translate(618 247)">
    <rect x="0" y="20" width="105" height="63" rx="4" fill="#2f4153"/>
    <rect x="8" y="27" width="89" height="49" fill="#f4f8fb"/>
    <rect x="16" y="35" width="24" height="12" fill="#49a84f"/>
    <rect x="47" y="35" width="18" height="12" fill="#2b87d1"/>
    <rect x="70" y="35" width="18" height="12" fill="#ff8b22"/>
    <path d="M18 65 L28 55 L38 61 L48 50 L59 58 L72 46 L86 53" stroke="#2b87d1" stroke-width="2" fill="none"/>
    <rect x="111" y="38" width="38" height="55" rx="6" fill="#2f4153"/>
    <rect x="116" y="45" width="28" height="39" fill="#f4f8fb"/>
    <rect x="121" y="51" width="18" height="7" fill="#49a84f"/>
    <rect x="121" y="63" width="18" height="7" fill="#ff8b22"/>
  </g>
  <text class="small" x="681" y="344" text-anchor="middle">Interactive React Web Interface</text>

  <!-- Arrows between layers -->
  <path class="flow" d="M214 105 C255 105 279 105 337 105"/>
  <path class="flow" d="M229 271 C269 271 294 265 336 246"/>
  <path class="flow" d="M484 146 C522 146 537 111 570 111"/>
  <path class="flow" d="M484 202 C523 202 537 195 570 195"/>
</svg>
